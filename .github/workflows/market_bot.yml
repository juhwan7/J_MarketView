name: Market Briefing Bot

on:
  push:
    branches:
      - main
  schedule:
    # 1. 아침 집중 모니터링 모드 (한국 시간 06:17 ~ 08:47 / 30분 간격)
    # UTC 기준: 21:17 ~ 23:47
    - cron: '17,47 21-23 * * *'

    # 2. 일반 시간 모드 (한국 시간 09:47 ~ 익일 05:47 / 2시간 간격)
    # UTC 기준: 00:47 ~ 20:47 (매 2시간마다)
    - cron: '47 0-20/2 * * *'
    
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push sent_urls.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 파일이 존재할 때만 add 하도록 설정 (에러 방지)
          git add sent_urls.txt sent_titles.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls and titles" && git push)
