name: Market Briefing Bot

on:
  push:
    branches:
      - main  # 본인의 기본 브랜치 이름이 master라면 master로 변경하세요.
  schedule:
    - cron: '20 23 * * *'  # 한국 시간 오전 8시 40분
    - cron: '20 6 * * *'   # 한국 시간 오후 3시 20분
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push sent_urls.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sent_urls.txt
          # 변경사항이 있을 때만 커밋하고 푸시합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls" && git push)
