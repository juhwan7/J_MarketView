name: Market Briefing Bot

on:
  push:
    branches:
      - main
  schedule:
    # 매 30분마다 실행 (UTC 21:00은 한국 시간 오전 06:00입니다)
    # 하루 종일 30분 간격으로 작동하게 하려면 아래와 같이 설정합니다.
    - cron: '0,30 * * * *' 
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push sent_urls.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
          git add sent_urls.txt sent_titles.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls and titles" && git push)