name: Market Briefing Bot

on:
  push:
    branches:
      - main
  schedule:
    # 깃허브 액션 서버 과부하(정각, 30분)를 피하기 위해 분(minute) 단위를 비껴가도록 설정했습니다.

    # 1. 아침 집중 모니터링 모드 (한국 시간 07:00 ~ 08:59 / 10분 간격)
    # KST 07:07, 07:17, ... 08:57 실행
    # UTC 기준: 22:00 ~ 23:59
    - cron: '7,17,27,37,47,57 22,23 * * *'

    # 2. 일반 시간 모드 (한국 시간 09:00 ~ 20:30 / 1시간 간격)
    # KST 09:27, 10:27, ... 20:27 실행 (저녁 8시 27분이 마지막 실행)
    # UTC 기준: 00:00 ~ 11:00
    - cron: '27 0-11 * * *'
    
    # 3. 밤 10시 남은 리포트 일괄 발송 (한국 시간 22:00)
    # KST 22:11 실행
    # UTC 기준: 13:11
    - cron: '11 13 * * *'
  
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push sent_urls.txt
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 파일이 존재할 때만 add 하도록 설정 (에러 방지)
          git add sent_urls.txt sent_titles.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls and titles" && git push)
